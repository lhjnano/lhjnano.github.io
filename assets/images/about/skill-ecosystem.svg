<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="500" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">기술 생태계</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#7f8c8d">실무 경험을 중심으로 학습 영역을 확장</text>

  <!-- ===== 실무 경험 (Core) ===== -->

  <!-- Center: Storage OS -->
  <rect x="340" y="95" width="240" height="80" rx="12" fill="url(#coreGrad)" filter="url(#shadow2)"/>
  <text x="460" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="white">온프레미스 스토리지 OS</text>
  <text x="460" y="148" text-anchor="middle" font-size="11" fill="#bdc3c7">AnyStor-E · 2022~현재</text>

  <!-- Core tech: Linux/OS -->
  <rect x="60" y="210" width="180" height="70" rx="10" fill="#e74c3c" filter="url(#shadow2)" opacity="0.92"/>
  <text x="150" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="white">Linux &amp; OS</text>
  <text x="150" y="257" text-anchor="middle" font-size="10" fill="#fadbd8">CentOS 재빌드 · Koji · Pungi</text>
  <text x="150" y="271" text-anchor="middle" font-size="10" fill="#fadbd8">Systemd · Bash · RPM</text>

  <!-- Core tech: Storage -->
  <rect x="260" y="210" width="180" height="70" rx="10" fill="#e67e22" filter="url(#shadow2)" opacity="0.92"/>
  <text x="350" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="white">Storage</text>
  <text x="350" y="257" text-anchor="middle" font-size="10" fill="#fdebd0">ZFS · LVM · Lustre · Snapshot</text>
  <text x="350" y="271" text-anchor="middle" font-size="10" fill="#fdebd0">NFS · SMB · iSCSI · S3</text>

  <!-- Core tech: Cluster/HA -->
  <rect x="460" y="210" width="180" height="70" rx="10" fill="#9b59b6" filter="url(#shadow2)" opacity="0.92"/>
  <text x="550" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="white">Cluster &amp; HA</text>
  <text x="550" y="257" text-anchor="middle" font-size="10" fill="#e8daef">Paxos · Pacemaker · Corosync</text>
  <text x="550" y="271" text-anchor="middle" font-size="10" fill="#e8daef">Split Brain 방지 · Quorum</text>

  <!-- Core tech: Backend -->
  <rect x="660" y="210" width="180" height="70" rx="10" fill="#3498db" filter="url(#shadow2)" opacity="0.92"/>
  <text x="750" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="white">Backend Dev</text>
  <text x="750" y="257" text-anchor="middle" font-size="10" fill="#d4e6f1">Perl · Go · JavaScript</text>
  <text x="750" y="271" text-anchor="middle" font-size="10" fill="#d4e6f1">MVC · REST API · ExtJS</text>

  <!-- Connecting lines from core to tech -->
  <line x1="400" y1="175" x2="150" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="175" x2="350" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="490" y1="175" x2="550" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="175" x2="750" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== 학습 관심 분야 (Learning) ===== -->

  <!-- Divider -->
  <line x1="60" y1="320" x2="860" y2="320" stroke="#ecf0f1" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="460" y="345" text-anchor="middle" font-size="12" fill="#95a5a6" font-style="italic">학습 &amp; 관심 분야</text>

  <!-- Learning: Cloud -->
  <rect x="60" y="365" width="180" height="80" rx="10" fill="white" stroke="#f39c12" stroke-width="2" filter="url(#shadow2)"/>
  <text x="150" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#f39c12">Cloud</text>
  <text x="150" y="412" text-anchor="middle" font-size="10" fill="#7f8c8d">AWS (S3/EC2/VPC)</text>
  <text x="150" y="426" text-anchor="middle" font-size="10" fill="#7f8c8d">OpenStack · K8s</text>

  <!-- Learning: Security -->
  <rect x="260" y="365" width="180" height="80" rx="10" fill="white" stroke="#e74c3c" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#e74c3c">Security &amp; IAM</text>
  <text x="350" y="412" text-anchor="middle" font-size="10" fill="#7f8c8d">OAuth2 · OIDC · JWT</text>
  <text x="350" y="426" text-anchor="middle" font-size="10" fill="#7f8c8d">Kerberos · MFA · PBAC</text>

  <!-- Learning: AI Dev -->
  <rect x="460" y="365" width="180" height="80" rx="10" fill="white" stroke="#8e44ad" stroke-width="2" filter="url(#shadow2)"/>
  <text x="550" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#8e44ad">AI Development</text>
  <text x="550" y="412" text-anchor="middle" font-size="10" fill="#7f8c8d">AI 거버넌스 · 테스트 전략</text>
  <text x="550" y="426" text-anchor="middle" font-size="10" fill="#7f8c8d">MCP · 아키텍처 트레이드오프</text>

  <!-- Learning: FS Deep Dive -->
  <rect x="660" y="365" width="180" height="80" rx="10" fill="white" stroke="#16a085" stroke-width="2" filter="url(#shadow2)"/>
  <text x="750" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#16a085">Storage Deep Dive</text>
  <text x="750" y="412" text-anchor="middle" font-size="10" fill="#7f8c8d">ZFS · LVM 소스 분석</text>
  <text x="750" y="426" text-anchor="middle" font-size="10" fill="#7f8c8d">I/O 성능 패턴</text>

  <!-- Upward arrows from learning to core -->
  <line x1="150" y1="365" x2="150" y2="285" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="350" y1="365" x2="350" y2="285" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="550" y1="365" x2="550" y2="285" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="750" y1="365" x2="750" y2="285" stroke="#16a085" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
</svg>
