<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="440" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Career Evolution</text>

  <!-- Timeline line -->
  <line x1="60" y1="140" x2="860" y2="140" stroke="url(#grad1)" stroke-width="4" stroke-linecap="round"/>

  <!-- Arrow head -->
  <polygon points="860,134 875,140 860,146" fill="#27ae60"/>

  <!-- Phase 1: IoT & Web -->
  <circle cx="180" cy="140" r="22" fill="#3498db" filter="url(#shadow1)"/>
  <text x="180" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>

  <rect x="60" y="185" width="240" height="170" rx="10" fill="white" stroke="#3498db" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="60" y="185" width="240" height="38" rx="10" fill="#3498db"/>
  <rect x="60" y="210" width="240" height="13" fill="#3498db"/>
  <text x="180" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="white">IoT &amp; 웹 서비스</text>
  <text x="180" y="240" text-anchor="middle" font-size="11" fill="#7f8c8d">2015.09 ~ 2017.05</text>

  <text x="80" y="265" font-size="11" fill="#2c3e50" font-weight="600">▪ 정부 R&amp;D (RRUI)</text>
  <text x="80" y="283" font-size="11" fill="#2c3e50" font-weight="600">▪ 위치기반 관광 플랫폼</text>
  <text x="80" y="301" font-size="11" fill="#2c3e50" font-weight="600">▪ IoT 통합 제어</text>
  <text x="80" y="328" font-size="10" fill="#95a5a6">Java · Spring · Android</text>
  <text x="80" y="343" font-size="10" fill="#95a5a6">Groovy · SmartThings</text>

  <!-- Phase 2: Embedded & Media -->
  <circle cx="460" cy="140" r="22" fill="#e67e22" filter="url(#shadow1)"/>
  <text x="460" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>

  <rect x="340" y="185" width="240" height="170" rx="10" fill="white" stroke="#e67e22" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="340" y="185" width="240" height="38" rx="10" fill="#e67e22"/>
  <rect x="340" y="210" width="240" height="13" fill="#e67e22"/>
  <text x="460" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="white">임베디드 &amp; 미디어</text>
  <text x="460" y="240" text-anchor="middle" font-size="11" fill="#7f8c8d">2017.06 ~ 2021.12</text>

  <text x="360" y="265" font-size="11" fill="#2c3e50" font-weight="600">▪ KT GiGAeyes GIB</text>
  <text x="360" y="283" font-size="11" fill="#2c3e50" font-weight="600">▪ CCTV 펌웨어 개발</text>
  <text x="360" y="301" font-size="11" fill="#2c3e50" font-weight="600">▪ gNVR 안드로이드 앱</text>
  <text x="360" y="328" font-size="10" fill="#95a5a6">C · C++ · JNI · FFmpeg</text>
  <text x="360" y="343" font-size="10" fill="#95a5a6">RTSP/HLS · Onvif · OpenSSL</text>

  <!-- Phase 3: Storage & Infra -->
  <circle cx="740" cy="140" r="22" fill="#27ae60" filter="url(#shadow1)"/>
  <text x="740" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>

  <rect x="620" y="185" width="240" height="170" rx="10" fill="white" stroke="#27ae60" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="620" y="185" width="240" height="38" rx="10" fill="#27ae60"/>
  <rect x="620" y="210" width="240" height="13" fill="#27ae60"/>
  <text x="740" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="white">스토리지 &amp; 인프라</text>
  <text x="740" y="240" text-anchor="middle" font-size="11" fill="#7f8c8d">2022.06 ~ 현재</text>

  <text x="640" y="265" font-size="11" fill="#2c3e50" font-weight="600">▪ 스토리지 관리 OS (LVM)</text>
  <text x="640" y="283" font-size="11" fill="#2c3e50" font-weight="600">▪ 클러스터 HA (Paxos)</text>
  <text x="640" y="301" font-size="11" fill="#2c3e50" font-weight="600">▪ 백엔드 팀 이동 (ZFS/Lustre)</text>
  <text x="640" y="319" font-size="11" fill="#e74c3c" font-weight="700">★ OpenZFS 기여 (PR#18611)</text>
  <text x="640" y="343" font-size="10" fill="#95a5a6">Go · Perl · ZFS · Lustre · K8S</text>
  <text x="640" y="358" font-size="10" fill="#95a5a6">Redis · MariaDB · Grafana</text>

  <!-- Transition labels -->
  <text x="320" y="125" text-anchor="middle" font-size="10" fill="#95a5a6" font-style="italic">Java → C/C++</text>
  <text x="600" y="125" text-anchor="middle" font-size="10" fill="#95a5a6" font-style="italic">C/C++ → Perl/Go</text>
</svg>
