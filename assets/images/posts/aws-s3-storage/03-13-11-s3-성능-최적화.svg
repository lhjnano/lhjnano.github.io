<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 680" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <style>text{fill:#2c3e50}</style>
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="700">⚡ S3 성능 최적화 기법</text>

  <text x="60" y="54" font-size="13" font-weight="700">1️⃣ 멀티파트 업로드</text>
  <line x1="40" y1="62" x2="680" y2="62" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="260" y="74" width="160" height="38" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="340" y="98" text-anchor="middle" font-size="11" font-weight="600">📁 10GB 파일</text>
  <line x1="340" y1="112" x2="340" y2="138" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="370" y="130" font-size="9" fill="#546e7a">분할</text>

  <rect x="140" y="142" width="400" height="36" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#sh)"/>
  <text x="200" y="165" font-size="10" font-weight="600">Part1</text>
  <text x="280" y="165" font-size="10" font-weight="600">Part2</text>
  <text x="360" y="165" font-size="10" font-weight="600">Part3</text>
  <text x="440" y="165" font-size="10" font-weight="600">Part4</text>
  <text x="500" y="165" font-size="9" fill="#495057">(병렬 업로드)</text>

  <line x1="340" y1="178" x2="340" y2="204" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="370" y="196" font-size="9" fill="#546e7a">결합</text>
  <rect x="260" y="208" width="160" height="38" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="340" y="232" text-anchor="middle" font-size="11" font-weight="600">📦 S3 객체</text>

  <text x="60" y="276" font-size="13" font-weight="700">2️⃣ S3 Transfer Acceleration</text>
  <line x1="40" y1="284" x2="680" y2="284" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="300" text-anchor="middle" font-size="10" fill="#495057">CloudFront 엣지 로케이션을 활용한 장거리 업로드 가속</text>

  <rect x="40" y="310" width="180" height="60" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="130" y="334" text-anchor="middle" font-size="11" font-weight="700">👤 사용자(한국)</text>
  <text x="130" y="352" text-anchor="middle" font-size="9">업로드 요청</text>

  <line x1="220" y1="340" x2="310" y2="340" stroke="#546e7a" stroke-width="2" marker-end="url(#ar)"/>
  <text x="265" y="332" text-anchor="middle" font-size="9" fill="#546e7a">빠른 전송</text>

  <rect x="314" y="310" width="180" height="60" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#sh)"/>
  <text x="404" y="334" text-anchor="middle" font-size="11" font-weight="700">🌐 CloudFront Edge</text>
  <text x="404" y="352" text-anchor="middle" font-size="9">엣지 최적화</text>

  <line x1="494" y1="340" x2="530" y2="340" stroke="#546e7a" stroke-width="2" marker-end="url(#ar)"/>
  <text x="512" y="332" font-size="9" fill="#546e7a">AWS 백본</text>

  <rect x="534" y="310" width="150" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="609" y="334" text-anchor="middle" font-size="11" font-weight="700">📦 S3(버지니아)</text>
  <text x="609" y="352" text-anchor="middle" font-size="9">버킷</text>

  <rect x="120" y="378" width="480" height="24" rx="6" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="396" text-anchor="middle" font-size="9" fill="#495057">가까운 엣지에서 수신 → AWS 백본을 통해 빠르게 전송</text>

  <text x="60" y="430" font-size="13" font-weight="700">3️⃣ 키 이름 접두사 분산</text>
  <line x1="40" y1="438" x2="680" y2="438" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="60" y="450" width="300" height="100" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="210" y="474" text-anchor="middle" font-size="11" font-weight="700">❌ 비효율적 (순차적 접두사)</text>
  <text x="80" y="496" font-size="10" font-family="monospace">photos/2026/01/img1.jpg</text>
  <text x="80" y="512" font-size="10" font-family="monospace">photos/2026/01/img2.jpg</text>
  <text x="80" y="528" font-size="10" font-family="monospace">photos/2026/01/img3.jpg</text>
  <text x="80" y="544" font-size="9" fill="#dc2626">→ 동일 파티션 집중 → 병목</text>

  <rect x="380" y="450" width="300" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="530" y="474" text-anchor="middle" font-size="11" font-weight="700">✅ 효율적 (분산된 접두사)</text>
  <text x="400" y="496" font-size="10" font-family="monospace">photos/a1/2026/01/img1.jpg</text>
  <text x="400" y="512" font-size="10" font-family="monospace">photos/b7/2026/01/img2.jpg</text>
  <text x="400" y="528" font-size="10" font-family="monospace">photos/c3/2026/01/img3.jpg</text>
  <text x="400" y="544" font-size="9" fill="#16a34a">→ 여러 파티션 분산 → 높은 처리량</text>

  <rect x="120" y="565" width="480" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="585" text-anchor="middle" font-size="10" font-weight="600">💡 해시 기반 접두사 사용:</text>
  <text x="360" y="600" text-anchor="middle" font-size="10" font-family="monospace">hex(sha256(key))[0:2] / original-key</text>
</svg>