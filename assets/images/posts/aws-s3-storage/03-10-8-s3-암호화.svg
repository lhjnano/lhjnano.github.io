  <text x="360" y="226" text-anchor="middle" font-size="9" fill="#64748b">KMS API 요금 발생</text>

  <rect x="470" y="70" width="180" height="185" rx="10" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="560" y="98" text-anchor="middle" font-size="12" font-weight="700">🗝️ SSE-C</text>
  <text x="560" y="118" text-anchor="middle" font-size="10">고객 제공 키</text>
  <text x="560" y="134" text-anchor="middle" font-size="10">사용</text>
  <line x1="490" y1="146" x2="630" y2="146" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="560" y="168" text-anchor="middle" font-size="11" font-weight="600">👤 키 관리</text>
