  <text x="160" y="226" text-anchor="middle" font-size="9" fill="#64748b">키 교체 자동 관리</text>

  <rect x="270" y="70" width="180" height="185" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="98" text-anchor="middle" font-size="12" font-weight="700">🔑 SSE-KMS</text>
  <text x="360" y="118" text-anchor="middle" font-size="10">KMS 키</text>
  <text x="360" y="134" text-anchor="middle" font-size="10">사용</text>
  <line x1="290" y1="146" x2="430" y2="146" stroke="#94a3b8" stroke-width="0.5"/>
