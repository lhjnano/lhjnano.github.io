  <rect x="80" y="350" width="150" height="40" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="155" y="375" text-anchor="middle" font-size="11" font-weight="600">📱 애플리케이션</text>
  <line x1="230" y1="370" x2="290" y2="370" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="260" y="362" font-size="9" fill="#546e7a">암호화</text>
  <rect x="294" y="350" width="130" height="40" rx="8" fill="#fce4ec" stroke="#ef4444" stroke-width="1.5"/>
  <text x="359" y="375" text-anchor="middle" font-size="11" font-weight="600">🔐 암호화</text>
  <line x1="424" y1="370" x2="484" y2="370" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="488" y="350" width="160" height="40" rx="8" fill="#e8f5e9" stroke="#22c55e" stroke-width="1.5"/>
  <text x="568" y="370" text-anchor="middle" font-size="11" font-weight="600">📦 S3</text>
  <text x="568" y="384" text-anchor="middle" font-size="9">(암호화된 데이터만)</text>

  <text x="360" y="420" text-anchor="middle" font-size="10" fill="#64748b">AWS KMS 또는 고객 관리 키 사용 | AWS Encryption SDK / S3 Encryption Client</text>
