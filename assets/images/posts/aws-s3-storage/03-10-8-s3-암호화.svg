<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <style>text{fill:#1e293b}</style>
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>
  <rect x="40" y="10" width="640" height="260" rx="12" fill="#fce4ec" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <text x="360" y="38" text-anchor="middle" font-size="13" font-weight="700">🔐 서버 측 암호화 (SSE)</text>
  <text x="360" y="56" text-anchor="middle" font-size="10">AWS가 암호화/복호화 수행</text>

  <rect x="70" y="70" width="180" height="185" rx="10" fill="#e8f5e9" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="98" text-anchor="middle" font-size="12" font-weight="700">🔒 SSE-S3</text>
  <text x="160" y="118" text-anchor="middle" font-size="10">Amazon 관리</text>
  <text x="160" y="134" text-anchor="middle" font-size="10">암호화 키</text>
  <line x1="90" y1="146" x2="230" y2="146" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="160" y="168" text-anchor="middle" font-size="11" font-weight="600">⭐ 기본값</text>
