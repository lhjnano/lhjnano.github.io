  <text x="560" y="210" text-anchor="middle" font-size="9" fill="#64748b">AWS는 키 미저장</text>
  <text x="560" y="226" text-anchor="middle" font-size="9" fill="#64748b">키 분실 시 복구 불가</text>

  <rect x="40" y="285" width="640" height="175" rx="12" fill="#fff3e0" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
