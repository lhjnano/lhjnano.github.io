<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect x="70.0" y="60" width="420" height="60" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="280.0" y="85" font-size="14" fill="#4183c4" font-weight="bold" text-anchor="middle">1. 정책 수집</text>
  <text x="280.0" y="107" font-size="11" fill="#555" font-weight="normal" text-anchor="middle">사용자 + 그룹 + 시스템 정책 수집</text>
  <rect x="70.0" y="150" width="420" height="60" rx="10" fill="#fff0f0" stroke="#f85149" stroke-width="1.5"/>
  <text x="280.0" y="175" font-size="14" fill="#f85149" font-weight="bold" text-anchor="middle">2. 기본 결정: DENY</text>
  <text x="280.0" y="197" font-size="11" fill="#555" font-weight="normal" text-anchor="middle">명시적으로 허용하지 않으면 모두 거부</text>
  <rect x="70.0" y="240" width="420" height="60" rx="10" fill="#fffdf0" stroke="#d29922" stroke-width="1.5"/>
  <text x="280.0" y="265" font-size="14" fill="#d29922" font-weight="bold" text-anchor="middle">3. Statement 평가</text>
  <text x="280.0" y="287" font-size="11" fill="#555" font-weight="normal" text-anchor="middle">Action 매칭 -&gt; Resource 매칭 -&gt; Condition 확인</text>
  <rect x="70.0" y="330" width="420" height="60" rx="10" fill="#fff0f0" stroke="#f85149" stroke-width="1.5"/>
  <text x="280.0" y="355" font-size="14" fill="#f85149" font-weight="bold" text-anchor="middle">4. Deny 발견?</text>
  <text x="280.0" y="377" font-size="11" fill="#555" font-weight="normal" text-anchor="middle">Deny가 하나라도 있으면 즉시 DENY 반환</text>
  <rect x="70.0" y="420" width="420" height="60" rx="10" fill="#f0fff4" stroke="#3fb950" stroke-width="1.5"/>
  <text x="280.0" y="445" font-size="14" fill="#3fb950" font-weight="bold" text-anchor="middle">5. Allow 합산</text>
  <text x="280.0" y="467" font-size="11" fill="#555" font-weight="normal" text-anchor="middle">Allow가 있으면 ALLOW, 없으면 DENY</text>
  <line x1="280.0" y1="120" x2="280.0" y2="150" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="280.0" y1="210" x2="280.0" y2="240" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="280.0" y1="300" x2="280.0" y2="330" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="280.0" y1="390" x2="280.0" y2="420" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>

</svg>