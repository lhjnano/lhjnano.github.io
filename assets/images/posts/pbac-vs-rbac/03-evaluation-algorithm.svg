<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>  <rect x="80" y="60" width="400" height="55" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>  <text x="280.0" y="82" font-size="13" fill="#4183c4" font-weight="bold" text-anchor="middle">1. 정책 수집</text>  <text x="280.0" y="102" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">사용자 + 그룹 + 시스템 정책</text>  <rect x="80" y="130" width="400" height="55" rx="10" fill="#fff0f0" stroke="#f85149" stroke-width="1.5"/>  <text x="280.0" y="152" font-size="13" fill="#f85149" font-weight="bold" text-anchor="middle">2. 기본 결정: DENY</text>  <text x="280.0" y="172" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">모든 것은 기본적으로 거부</text>  <rect x="80" y="210" width="400" height="55" rx="10" fill="#fffdf0" stroke="#d29922" stroke-width="1.5"/>  <text x="280.0" y="232" font-size="13" fill="#d29922" font-weight="bold" text-anchor="middle">3. Statement 평가</text>  <text x="280.0" y="252" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">Action 매칭 → Resource 매칭</text>  <text x="280.0" y="266" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">→ Condition 확인</text>  <rect x="80" y="300" width="400" height="55" rx="10" fill="#fff0f0" stroke="#f85149" stroke-width="1.5"/>  <text x="280.0" y="322" font-size="13" fill="#f85149" font-weight="bold" text-anchor="middle">4. Deny 발견?</text>  <text x="280.0" y="342" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">Deny가 하나라도 있으면 즉시 DENY</text>  <rect x="80" y="370" width="400" height="55" rx="10" fill="#f0fff4" stroke="#3fb950" stroke-width="1.5"/>  <text x="280.0" y="392" font-size="13" fill="#3fb950" font-weight="bold" text-anchor="middle">5. Allow 합산</text>  <text x="280.0" y="412" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">Allow가 하나라도 있으면 ALLOW</text>  <text x="280.0" y="426" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">없으면 DENY</text>  <line x1="280.0" y1="115" x2="280.0" y2="130" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>  <line x1="280.0" y1="185" x2="280.0" y2="210" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>  <line x1="280.0" y1="265" x2="280.0" y2="300" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>  <line x1="280.0" y1="355" x2="280.0" y2="370" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
</svg>