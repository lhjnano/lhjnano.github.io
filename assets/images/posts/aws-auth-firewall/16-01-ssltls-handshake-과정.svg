<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 740 380" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
                    <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
                  </filter>
                  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M0 0 L10 5 L0 10z" fill="#546e7a"/>
                  </marker>
                  <marker id="ah-left" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M10 0 L0 5 L10 10z" fill="#546e7a"/>
                  </marker>
                </defs>
                <rect x="0" y="0" width="740" height="380" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
                <text x="370" y="26" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="14" font-weight="bold" fill="#1e293b">🔐 TLS 1.3 Handshake 과정</text>
                <rect x="80" y="45" width="160" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)"/>
                <text x="160" y="75" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="13" font-weight="bold" fill="#0c4a6e">💻 클라이언트</text>
                <rect x="500" y="45" width="160" height="50" rx="8" fill="#fff3e0" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
                <text x="580" y="75" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="13" font-weight="bold" fill="#92400e">🖥️ 서버</text>
                <line x1="240" y1="62" x2="500" y2="62" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ah)"/>
                <rect x="300" y="50" width="150" height="20" rx="4" fill="#e0f2fe" opacity="0.8"/>
                <text x="375" y="65" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">① ClientHello</text>
                <text x="375" y="80" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="9" fill="#546e7a">암호화 스위트, 키 공유</text>
                <line x1="500" y1="105" x2="240" y2="105" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ah-left)"/>
                <rect x="280" y="92" width="190" height="20" rx="4" fill="#fff3e0" opacity="0.8"/>
                <text x="375" y="106" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="10" font-weight="bold" fill="#92400e">② ServerHello + 인증서</text>
                <text x="375" y="122" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="9" fill="#546e7a">선택된 암호화, 서버 키 공유</text>
                <rect x="80" y="140" width="250" height="35" rx="6" fill="#fce4ec" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
                <text x="205" y="162" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="10" fill="#991b1b">③ 인증서 검증 (CA 체인, 도메인 확인)</text>
                <rect x="80" y="185" width="250" height="35" rx="6" fill="#e8f5e9" stroke="#22c55e" stroke-width="1" opacity="0.7"/>
                <text x="205" y="207" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="10" fill="#166534">④ 세션 키 생성 (1-RTT 완료)</text>
                <line x1="240" y1="240" x2="500" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#ah)"/>
                <line x1="500" y1="255" x2="240" y2="255" stroke="#22c55e" stroke-width="2" marker-end="url(#ah-left)"/>
                <rect x="310" y="235" width="130" height="20" rx="4" fill="#e8f5e9" opacity="0.8"/>
                <text x="375" y="250" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="10" font-weight="bold" fill="#166534">⑤ 암호화 통신</text>
                <text x="375" y="275" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="9" fill="#546e7a">Application Data</text>
                </svg>