                <rect x="0" y="0" width="740" height="380" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
                <text x="370" y="26" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="14" font-weight="bold" fill="#1e293b">🛡️ AWS Shield 방어 계층</text>
                <text x="80" y="58" font-family="'Noto Sans KR',sans-serif" font-size="12" fill="#ef4444">⚡ 공격 트래픽</text>
