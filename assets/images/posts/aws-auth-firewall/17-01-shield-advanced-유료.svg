                <text x="370" y="210" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="13" font-weight="bold" fill="#991b1b">🔒 L7 방어 (Shield Advanced)</text>
                <text x="370" y="230" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="11" fill="#991b1b">• HTTP 플러드, Slowloris • 애플리케이션 계층 자동 완화</text>
