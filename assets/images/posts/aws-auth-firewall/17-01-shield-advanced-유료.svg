                <text x="370" y="100" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="13" font-weight="bold" fill="#991b1b">🛡️ L3/L4 방어 (Shield Standard)</text>
                <text x="370" y="120" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="11" fill="#991b1b">• SYN Flood, UDP Flood, ICMP Flood</text>
