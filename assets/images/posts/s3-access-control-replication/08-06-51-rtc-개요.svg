<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
            <defs><marker id="arr16" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker><filter id="sh16" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>
            <rect width="800" height="380" fill="#f8fafb" rx="8"/>
            
<text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">S3 RTC 동작 흐름</text>

<rect x="30" y="45" width="150" height="100" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh16)"/>
<text x="105" y="99" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#2c3e50">소스 버킷</text>
<text x="45" y="90" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666666">업로드</text>

<line x1="180" y1="95" x2="270" y2="95" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr16)"/>

<!-- S3 Replication Service -->
<rect x="270" y="45" width="300" height="180" rx="8" fill="#f3e5f5" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh16)"/>
<text x="420" y="68" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#7c3aed">S3 Replication Service</text>

<!-- RTC Monitoring inner box -->
<rect x="290" y="82" width="260" height="90" rx="6" fill="white" stroke="#7c3aed" stroke-width="1"/>
<text x="420" y="100" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#7c3aed">RTC 모니터링</text>
<text x="310" y="120" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• 복제 진행 추적</text>
<text x="310" y="136" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• 지연 임계값</text>
<text x="310" y="152" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• 알림 발송</text>

<line x1="570" y1="95" x2="660" y2="95" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr16)"/>
<text x="615" y="85" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#7c3aed">복제 (15분 이내)</text>

<rect x="660" y="45" width="110" height="100" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh16)"/>
<text x="715" y="99" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#2c3e50">대상 버킷</text>

<!-- CloudWatch metrics -->
<rect x="30" y="260" width="740" height="100" rx="6" fill="white" stroke="#bdbdbd" stroke-width="1"/>
<text x="50" y="280" text-anchor="start" font-size="11" font-weight="bold" font-family="sans-serif" fill="#37474f">CloudWatch 메트릭:</text>
<text x="50" y="298" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• ReplicationLatency: 복제 지연 시간</text>
<text x="50" y="314" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• BytesPendingReplication: 복제 대기 바이트</text>
<text x="50" y="330" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• OperationsPendingReplication: 복제 대기 작업 수</text>
<text x="450" y="298" text-anchor="start" font-size="11" font-weight="bold" font-family="sans-serif" fill="#37474f">알림 설정:</text>
<text x="450" y="316" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• 복제 지연 15분 초과 시 SNS 알림</text>
<text x="450" y="332" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">• 복제 실패 시 즉시 알림</text>

            </svg>