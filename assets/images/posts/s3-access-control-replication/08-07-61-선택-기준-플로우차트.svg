<rect x="480" y="388" width="160" height="35" rx="6" fill="#f3e5f5" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh17)"/>
<text x="560" y="409" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">Data Exchange</text>
