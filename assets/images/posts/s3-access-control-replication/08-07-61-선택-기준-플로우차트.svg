<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
            <defs><marker id="arr17" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker><filter id="sh17" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>
            <rect width="800" height="560" fill="#f8fafb" rx="8"/>
            
<text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">데이터 공유 방식 선택 플로우차트</text>

<rect x="20" y="36" width="760" height="510" rx="8" fill="none" stroke="#90a4ae" stroke-width="1" filter="url(#sh17)"/>

<text x="400" y="60" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#37474f">데이터를 어떻게 공유할까?</text>

<text x="400" y="82" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#546e7a">데이터 이동이 필요한가?</text>

