<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
            <defs><marker id="arr1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker><filter id="sh1" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>
            <rect width="800" height="640" fill="#f8fafb" rx="8"/>
            
<!-- Title -->
<text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">기존 IAM 방식의 문제점</text>

<!-- BEFORE: IAM 정책 관리 지옥 -->
<rect x="20" y="36" width="760" height="240" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh1)"/>
<text x="400" y="58" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#dc2626">IAM 정책 관리 지옥</text>

<!-- Users (left side) -->
<rect x="40" y="72" width="90" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh1)"/>
<text x="85" y="89" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">사용자 A</text>
<rect x="40" y="104" width="90" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh1)"/>
<text x="85" y="121" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">사용자 B</text>
<rect x="40" y="136" width="90" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh1)"/>
<text x="85" y="153" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">사용자 C</text>
<rect x="40" y="168" width="90" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh1)"/>
<text x="85" y="185" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">사용자 D</text>
<rect x="40" y="200" width="90" height="26" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh1)"/>
<text x="85" y="217" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">사용자 Z</text>

<!-- IAM Policies (right side) -->
<rect x="260" y="72" width="220" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh1)"/>
<text x="370" y="89" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">IAM 정책 1 (data/ 읽기)</text>
<rect x="260" y="104" width="220" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh1)"/>
<text x="370" y="121" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">IAM 정책 2 (images/ 읽기)</text>
<rect x="260" y="136" width="220" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh1)"/>
<text x="370" y="153" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">IAM 정책 3 (data/, images/ 읽기)</text>
<rect x="260" y="168" width="220" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh1)"/>
<text x="370" y="185" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">IAM 정책 4 (reports/ 쓰기)</text>
<rect x="260" y="200" width="220" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh1)"/>
<text x="370" y="217" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">IAM 정책 2600+ ...</text>

<!-- Arrows -->
<line x1="130" y1="85" x2="258" y2="85" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr1)"/>
<line x1="130" y1="117" x2="258" y2="117" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr1)"/>
<line x1="130" y1="149" x2="258" y2="149" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr1)"/>
<line x1="130" y1="181" x2="258" y2="181" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr1)"/>
<line x1="130" y1="213" x2="258" y2="213" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr1)"/>

<!-- Problems -->
<text x="520" y="90" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#dc2626">✗ 정책 수 폭발 (버킷×접두사×사용자)</text>
<text x="520" y="110" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#dc2626">✗ 정책 크기 제한 (JSON 20KB)</text>
<text x="520" y="130" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#dc2626">✗ 충돌과 디버깅 어려움</text>
<text x="520" y="150" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#dc2626">✗ IT 팀 병목 (모든 변경 요청 집중)</text>

<!-- Separator -->
<line x1="200" y1="290" x2="600" y2="290" stroke="#90a4ae" stroke-width="1" stroke-dasharray="6,3"/>
<text x="400" y="308" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#546e7a">Access Grants 적용 후</text>

<!-- AFTER: Access Grants 인스턴스 -->
<rect x="20" y="318" width="760" height="304" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh1)"/>
<text x="400" y="340" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#2e7d32">Access Grants 인스턴스</text>

<!-- Directory box -->
<rect x="50" y="355" width="170" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh1)"/>
<text x="135" y="384" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2c3e50">Directory (디렉토리)</text>
<text x="230" y="372" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666666">◄ IAM Identity Center (SSO)</text>
<text x="230" y="390" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666666">◄ 또는 IAM 사용자/역할</text>

<!-- Arrow down -->
<line x1="135" y1="405" x2="135" y2="428" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr1)"/>

<!-- Grants box -->
<rect x="50" y="432" width="710" height="120" rx="6" fill="white" stroke="#16a34a" stroke-width="1"/>
<text x="405" y="452" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2e7d32">Grants (권한 부여)</text>

<text x="70" y="472" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">Grant 1: 사용자 A → s3://bucket/data/   READ</text>
<text x="70" y="490" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">Grant 2: 그룹 "분석팀" → s3://bucket/analytics/  READ+WRITE</text>
<text x="70" y="508" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">Grant 3: 사용자 C → s3://bucket/images/  READ</text>
<text x="70" y="526" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">Grant 4: 역할 "DataEngineer" → s3://bucket/  READ+WRITE</text>

<!-- Benefits -->
<text x="50" y="575" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 중앙 집중식 관리</text>
<text x="250" y="575" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 디렉토리(AD/LDAP) 사용자 직접 매핑</text>
<text x="550" y="575" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 임시 자격 증명 자동 발급</text>
<text x="50" y="595" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 셀프서비스 권한 위임 가능</text>

            </svg>