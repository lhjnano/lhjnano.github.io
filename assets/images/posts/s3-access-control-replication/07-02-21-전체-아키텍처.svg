<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
            <defs><marker id="arr2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker><filter id="sh2" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>
            <rect width="800" height="520" fill="#f8fafb" rx="8"/>
            
<text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">S3 Access Grants 전체 아키텍처</text>

<!-- 기업 환경 outer box -->
<rect x="20" y="36" width="760" height="474" rx="8" fill="none" stroke="#90a4ae" stroke-width="1" filter="url(#sh2)"/>
<text x="400" y="56" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#37474f">기업 환경</text>

<!-- 기업 디렉토리 -->
<rect x="40" y="70" width="180" height="180" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh2)"/>
<text x="130" y="152" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2c3e50">기업 디렉토리</text>
<text x="130" y="168" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2c3e50">(AD / LDAP)</text>
<text x="60" y="130" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">├─ 사용자 A</text>
<text x="60" y="148" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">├─ 사용자 B</text>
<text x="60" y="166" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">├─ 그룹 "분석"</text>
<text x="60" y="184" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">├─ 그룹 "개발"</text>
<text x="60" y="202" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">└─ 그룹 "운영"</text>

<!-- Arrow from directory to AWS -->
<line x1="220" y1="160" x2="310" y2="160" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr2)"/>

<!-- AWS 계정 box -->
<rect x="310" y="70" width="450" height="380" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
<text x="535" y="92" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#92400e">AWS 계정</text>

<!-- IAM Identity Center -->
<rect x="330" y="105" width="410" height="330" rx="6" fill="none" stroke="#f59e0b" stroke-width="1"/>
<text x="535" y="125" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#92400e">IAM Identity Center (SSO)</text>

<!-- S3 Access Grants 인스턴스 -->
<rect x="350" y="140" width="370" height="280" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh2)"/>
<text x="535" y="162" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#92400e">S3 Access Grants 인스턴스</text>

<!-- 등록된 위치 -->
<rect x="370" y="178" width="200" height="80" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh2)"/>
<text x="470" y="202" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">등록된 위치</text>
<text x="470" y="218" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">s3://bucket/</text>
<text x="470" y="234" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">s3://bucket/data</text>

<!-- Grant box -->
<rect x="370" y="275" width="330" height="80" rx="6" fill="#f3e5f5" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh2)"/>
<text x="535" y="299" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">Grant (권한 부여)</text>
<text x="535" y="315" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">A → data/ READ</text>
<text x="535" y="331" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">B → images/ READ  |  분석 → all R/W</text>

<!-- Arrow down to S3 -->
<line x1="535" y1="425" x2="535" y2="465" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr2)"/>
<text x="545" y="450" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666666">임시 자격 증명</text>

<!-- S3 버킷 -->
<rect x="370" y="468" width="330" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh2)"/>
<text x="535" y="497" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif" fill="#2c3e50">S3 버킷: data/ | img/ | rpt/</text>

            </svg>