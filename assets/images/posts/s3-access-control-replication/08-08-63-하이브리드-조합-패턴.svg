<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
            <defs><marker id="arr18" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker><filter id="sh18" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>
            <rect width="800" height="580" fill="#f8fafb" rx="8"/>
            
<text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">하이브리드 조합: 복제 + Access Points + Data Exchange</text>

<!-- Primary bucket -->
<text x="400" y="48" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#37474f">제공자 (서울)</text>
<rect x="250" y="58" width="300" height="50" rx="6" fill="#fff3e0" stroke="#ff9900" stroke-width="1.5" filter="url(#sh18)"/>
<text x="400" y="87" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#333">primary-data-bucket (원본 데이터)</text>

<!-- Branches -->
<line x1="340" y1="108" x2="160" y2="145" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr18)"/>
<text x="220" y="120" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#e65100">CRR</text>

<line x1="460" y1="108" x2="500" y2="145" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr18)"/>
<text x="480" y="120" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#43a047">In-place</text>

<!-- 도쿄 복제본 -->
<rect x="40" y="148" width="230" height="60" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5" filter="url(#sh18)"/>
<text x="155" y="182" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#333">도쿄 복제본 버킷</text>
<text x="60" y="195" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666">→ 일본 소비자 (지연 최소화)</text>

<!-- Access Points -->
<rect x="370" y="148" width="200" height="130" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5" filter="url(#sh18)"/>
<text x="470" y="170" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1565c0">Access Points</text>

<rect x="390" y="180" width="160" height="30" rx="6" fill="#fff3e0" stroke="#ff9900" stroke-width="1.5" filter="url(#sh18)"/>
<text x="470" y="199" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#333">파트너사 A (읽기 전용)</text>
<rect x="390" y="218" width="160" height="30" rx="6" fill="#fff3e0" stroke="#ff9900" stroke-width="1.5" filter="url(#sh18)"/>
<text x="470" y="237" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#333">파트너사 B (읽기/쓰기)</text>

<text x="400" y="265" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666">→ 파트너사 (In-place, 비용 최소화)</text>

<!-- Data Exchange -->
<line x1="460" y1="278" x2="460" y2="310" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr18)"/>

<rect x="370" y="313" width="200" height="130" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" filter="url(#sh18)"/>
<text x="470" y="335" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#7b1fa2">Data Exchange (유료 구독)</text>

<rect x="390" y="350" width="160" height="30" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.5" filter="url(#sh18)"/>
<text x="470" y="369" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#333">구독자 X ($/월)</text>
<rect x="390" y="388" width="160" height="30" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.5" filter="url(#sh18)"/>
<text x="470" y="407" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#333">구독자 Y ($/월)</text>

<text x="400" y="455" text-anchor="start" font-size="9" font-weight="normal" font-family="sans-serif" fill="#666">→ 유료 고객 (상업적 거래)</text>

<!-- Results -->
<rect x="30" y="475" width="740" height="90" rx="6" fill="white" stroke="#bdbdbd" stroke-width="1"/>
<text x="50" y="495" text-anchor="start" font-size="11" font-weight="bold" font-family="sans-serif" fill="#37474f">결과:</text>
<text x="70" y="515" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#43a047">• 일본 소비자 → 도쿄 복제본 (지연 최소화)</text>
<text x="70" y="533" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#4285f4">• 파트너사 → Access Points (In-place, 비용 최소화)</text>
<text x="70" y="551" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#9c27b0">• 유료 고객 → Data Exchange (상업적 거래)</text>

            </svg>