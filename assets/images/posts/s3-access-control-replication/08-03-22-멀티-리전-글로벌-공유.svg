<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
            <defs><marker id="arr13" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker><filter id="sh13" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>
            <rect width="800" height="560" fill="#f8fafb" rx="8"/>
            
<text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">멀티 리전 복제 + Multi-Region Access Points 조합</text>

<rect x="20" y="36" width="760" height="510" rx="8" fill="none" stroke="#90a4ae" stroke-width="1" filter="url(#sh13)"/>

<!-- Primary bucket -->
<text x="400" y="58" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#37474f">제공자 (서울)</text>
<rect x="300" y="68" width="200" height="45" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh13)"/>
<text x="400" y="94" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif" fill="#2c3e50">primary-bucket (원본 데이터)</text>

<!-- Replication arrows -->
<line x1="350" y1="113" x2="150" y2="150" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>
<line x1="400" y1="113" x2="400" y2="150" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>
<line x1="450" y1="113" x2="650" y2="150" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>
<text x="220" y="128" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#92400e">S3 복제 규칙</text>

<!-- Replica buckets -->
<rect x="60" y="153" width="150" height="45" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh13)"/>
<text x="135" y="179" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">서울 복제본</text>
<rect x="325" y="153" width="150" height="45" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh13)"/>
<text x="400" y="179" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">도쿄 복제본</text>
<rect x="590" y="153" width="150" height="45" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh13)"/>
<text x="665" y="179" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2c3e50">버지니아 복제본</text>

<!-- Arrows to MRAP -->
<line x1="135" y1="198" x2="350" y2="270" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>
<line x1="400" y1="198" x2="400" y2="270" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>
<line x1="665" y1="198" x2="450" y2="270" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>

<!-- Multi-Region Access Point -->
<rect x="250" y="273" width="300" height="120" rx="8" fill="#f3e5f5" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh13)"/>
<text x="400" y="295" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#7c3aed">Multi-Region Access Point</text>
<text x="400" y="312" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#7c3aed">(단일 글로벌 엔드포인트)</text>
<text x="280" y="332" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" fill="#37474f">자동 라우팅:</text>
<text x="280" y="350" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2563eb">한국 → 서울 복제본</text>
<text x="280" y="365" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#92400e">일본 → 도쿄 복제본</text>
<text x="280" y="380" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">미국 → 버지니아 복제본</text>

<!-- Arrow to consumers -->
<line x1="400" y1="393" x2="400" y2="420" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr13)"/>

<!-- Consumers -->
<rect x="300" y="423" width="200" height="35" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#sh13)"/>
<text x="400" y="444" text-anchor="middle" font-size="9" font-weight="normal" font-family="sans-serif" fill="#2c3e50">한국 사용자 | 일본 사용자 | 미국 사용자</text>

<!-- Benefits -->
<text x="60" y="480" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 글로벌 단일 엔드포인트 (하나의 S3 URI)</text>
<text x="60" y="496" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 소비자는 자동으로 가장 가까운 리전에서 데이터 접근</text>
<text x="60" y="512" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 지연 시간 최소화</text>
<text x="60" y="528" text-anchor="start" font-size="10" font-weight="normal" font-family="sans-serif" fill="#2e7d32">✓ 가용성 극대화 (한 리전 장애 시 자동 장애 조치)</text>

            </svg>