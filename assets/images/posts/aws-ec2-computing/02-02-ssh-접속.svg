<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 740 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
  </defs>
  <rect width="740" height="180" fill="#f8fafc" rx="8"/>
  <text x="370" y="26" text-anchor="middle" font-size="14" font-weight="700" font-family="sans-serif" fill="#37474f">🔐 SSH / RDP 접속 예시</text>
  <rect x="30" y="42" width="340" height="55" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="200" y="63" text-anchor="middle" font-size="11" font-weight="600" font-family="sans-serif" fill="#0d47a1">🐧 Linux SSH 접속</text>
  <text x="200" y="83" text-anchor="middle" font-size="10" font-family="monospace" fill="#546e7a">$ ssh -i my-key.pem ec2-user@ec2-xx...amazonaws.com</text>
  <rect x="390" y="42" width="320" height="55" rx="8" fill="#fff3e0" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="63" text-anchor="middle" font-size="11" font-weight="600" font-family="sans-serif" fill="#e65100">🪟 Windows RDP 접속</text>
  <text x="550" y="83" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#546e7a">EC2 콘솔 → 암호 가져오기 → RDP (포트 3389)</text>
  <text x="370" y="125" text-anchor="middle" font-size="11" font-weight="600" font-family="sans-serif" fill="#546e7a">운영체제별 기본 사용자</text>
  <rect x="30" y="135" width="105" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="82" y="154" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">Amazon Linux: ec2-user</text>
  <rect x="145" y="135" width="85" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="187" y="154" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">Ubuntu: ubuntu</text>
  <rect x="240" y="135" width="110" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="295" y="154" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">Windows: Administrator</text>
  <rect x="360" y="135" width="85" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="402" y="154" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">Debian: admin</text>
  <rect x="455" y="135" width="85" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="497" y="154" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">CentOS: centos</text>
</svg>