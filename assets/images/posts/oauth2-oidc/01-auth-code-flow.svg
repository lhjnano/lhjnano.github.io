<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 680" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect x="35" y="15" width="130" height="55" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="100" y="38" font-size="13" fill="#4183c4" font-weight="bold" text-anchor="middle">사용자</text>
  <text x="100" y="56" font-size="11" fill="#666" font-weight="normal" text-anchor="middle">(브라우저)</text>
  <line x1="100" y1="70" x2="100" y2="655" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="305" y="15" width="130" height="55" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="370" y="38" font-size="13" fill="#4183c4" font-weight="bold" text-anchor="middle">Client</text>
  <text x="370" y="56" font-size="11" fill="#666" font-weight="normal" text-anchor="middle">(앱)</text>
  <line x1="370" y1="70" x2="370" y2="655" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="575" y="15" width="130" height="55" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="640" y="38" font-size="13" fill="#4183c4" font-weight="bold" text-anchor="middle">Auth Server</text>
  <line x1="640" y1="70" x2="640" y2="655" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="112" y1="110" x2="358" y2="110" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="235.0" y="104" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">"로그인" 클릭</text>
  <line x1="358" y1="160" x2="112" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="235.0" y="140" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">인가 페이지로</text>
  <text x="235.0" y="154" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">리다이렉트</text>
  <line x1="112" y1="215" x2="628" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="370.0" y="209" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">인가 페이지로 이동</text>
  <line x1="628" y1="265" x2="112" y2="265" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="370.0" y="259" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">동의 화면 표시</text>
  <line x1="112" y1="315" x2="628" y2="315" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="370.0" y="309" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">로그인 + 동의</text>
  <line x1="628" y1="365" x2="112" y2="365" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="370.0" y="345" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">Authorization Code</text>
  <text x="370.0" y="359" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">발급 (redirect)</text>
  <line x1="382" y1="420" x2="628" y2="420" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="505.0" y="400" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">코드로 토큰 교환</text>
  <text x="505.0" y="414" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">POST /token</text>
  <line x1="628" y1="475" x2="382" y2="475" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="505.0" y="455" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">Access Token</text>
  <text x="505.0" y="469" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">+ Refresh Token</text>
  <line x1="382" y1="530" x2="628" y2="530" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="505.0" y="510" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">API 호출</text>
  <text x="505.0" y="524" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">Authorization: Bearer</text>
  <line x1="628" y1="585" x2="382" y2="585" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="505.0" y="579" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">보호된 데이터 반환</text>
  <text x="370.0" y="670" font-size="11" fill="#8b949e" font-weight="normal" text-anchor="middle">프론트채널(브라우저 경유)과 백채널(서버 직접)의 분리가 핵심</text>

</svg>