<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah-s1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="ah-s2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="ah-s3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <filter id="shadow-s">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="430" y="28" font-size="15" font-weight="700" fill="#1e3a5f" text-anchor="middle">실전: 외부 앱 SSO 시나리오</text>

  <!-- ===== Actor lifelines ===== -->
  <!-- Actor A: 외부 모니터링 앱 (x=110) -->
  <rect x="35" y="50" width="150" height="50" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow-s)"/>
  <text x="110" y="80" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle">외부 모니터링 앱</text>
  <line x1="110" y1="100" x2="110" y2="540" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Actor B: 사용자 브라우저 (x=370) -->
  <rect x="295" y="50" width="150" height="50" rx="10" fill="#f0f4f8" stroke="#666" stroke-width="1.5" filter="url(#shadow-s)"/>
  <text x="370" y="80" font-size="12" font-weight="700" fill="#666" text-anchor="middle">사용자 (브라우저)</text>
  <line x1="370" y1="100" x2="370" y2="540" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Actor C: 인증 서버 (x=700) -->
  <rect x="625" y="50" width="150" height="50" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow-s)"/>
  <text x="700" y="73" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">인증 서버</text>
  <text x="700" y="89" font-size="10" fill="#888" text-anchor="middle">(OIDC Provider)</text>
  <line x1="700" y1="100" x2="700" y2="540" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== Steps (even spacing: 55px gap, starting at y=140) ===== -->

  <!-- Step 1: 사용자 → 인증 서버 (인가 요청) -->
  <!-- Source: 브라우저(370), Dest: 인증 서버(700) -->
  <circle cx="370" cy="140" r="12" fill="#666"/>
  <text x="370" y="144" font-size="11" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <line x1="385" y1="140" x2="685" y2="140" stroke="#666" stroke-width="1.5" marker-end="url(#ah-s1)"/>
  <text x="535" y="133" font-size="10" fill="#666" text-anchor="middle">인가 요청: scope=openid+profile</text>

  <!-- Step 2: 인증 서버 → 사용자 (로그인 화면) -->
  <!-- Source: 인증 서버(700), Dest: 브라우저(370) -->
  <circle cx="700" cy="195" r="12" fill="#666"/>
  <text x="700" y="199" font-size="11" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <line x1="685" y1="195" x2="385" y2="195" stroke="#666" stroke-width="1.5" marker-end="url(#ah-s1)"/>
  <text x="535" y="188" font-size="10" fill="#666" text-anchor="middle">로그인 화면 → 사용자 LDAP 인증</text>

  <!-- Step 3: 인증 서버 → 외부 앱 (Auth Code via redirect) -->
  <!-- Source: 인증 서버(700), Dest: 외부 앱(110). Goes through browser but lands at app callback -->
  <circle cx="700" cy="250" r="12" fill="#2563eb"/>
  <text x="700" y="254" font-size="11" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <line x1="685" y1="250" x2="125" y2="250" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-s2)"/>
  <text x="405" y="243" font-size="10" fill="#2563eb" text-anchor="middle">Authorization Code 발급 (redirect)</text>

  <!-- Step 4: 외부 앱 → 인증 서버 (토큰 교환, 백채널) -->
  <!-- Source: 외부 앱(110), Dest: 인증 서버(700) -->
  <circle cx="110" cy="305" r="12" fill="#2563eb"/>
  <text x="110" y="309" font-size="11" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <line x1="125" y1="305" x2="685" y2="305" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-s2)"/>
  <text x="405" y="298" font-size="10" fill="#2563eb" text-anchor="middle">POST /oauth/token (백채널, 직접 통신)</text>

  <!-- Step 5: 인증 서버 → 외부 앱 (Token 응답) -->
  <!-- Source: 인증 서버(700), Dest: 외부 앱(110) -->
  <circle cx="700" cy="360" r="12" fill="#16a34a"/>
  <text x="700" y="364" font-size="11" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <line x1="685" y1="360" x2="125" y2="360" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ah-s3)"/>
  <text x="405" y="353" font-size="10" fill="#16a34a" text-anchor="middle">ID Token + Access Token</text>

  <!-- Step 6: 외부 앱 내부 (ID Token 검증) -->
  <!-- No arrow, highlighted box at 외부 앱 position -->
  <circle cx="110" cy="410" r="12" fill="#dc2626"/>
  <text x="110" y="414" font-size="11" font-weight="bold" fill="white" text-anchor="middle">6</text>
  <rect x="140" y="395" width="470" height="32" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="375" y="409" font-size="10" fill="#dc2626" font-weight="600" text-anchor="middle">ID Token 서명 검증 (공개키로 iss, aud, exp 확인)</text>
  <text x="375" y="422" font-size="9" fill="#dc2626" text-anchor="middle">→ 사용자 인증 완료, 비밀번호 검증 불필요</text>

  <!-- Step 7: 외부 앱 → 인증 서버 (API 호출) -->
  <!-- Source: 외부 앱(110), Dest: 인증 서버(700) -->
  <circle cx="110" cy="465" r="12" fill="#2563eb"/>
  <text x="110" y="469" font-size="11" font-weight="bold" fill="white" text-anchor="middle">7</text>
  <line x1="125" y1="465" x2="685" y2="465" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-s2)"/>
  <text x="405" y="458" font-size="10" fill="#2563eb" text-anchor="middle">Access Token으로 API 호출</text>

  <!-- ===== Summary box ===== -->
  <rect x="35" y="495" width="740" height="60" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="405" y="517" font-size="11" fill="#92400e" font-weight="700" text-anchor="middle">SSO의 본질</text>
  <text x="405" y="534" font-size="10" fill="#92400e" text-anchor="middle">외부 앱은 사용자 비밀번호를 한 번도 만지지 않는다. 신뢰의 부담이 외부 앱에서 인증 서버로 옮겨간다.</text>
  <text x="405" y="549" font-size="10" fill="#92400e" text-anchor="middle">한 번 로그인으로 여러 앱에 신원이 전파되되, 각 앱은 비밀번호를 절대 다루지 않는다.</text>
</svg>
