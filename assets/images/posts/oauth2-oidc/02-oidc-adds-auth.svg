<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <filter id="shadow-o">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="410" y="30" font-size="15" font-weight="700" fill="#1e3a5f" text-anchor="middle">OIDC = OAuth2 + 인증 계층</text>

  <!-- OAuth2 base layer -->
  <rect x="40" y="60" width="740" height="120" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow-o)"/>
  <text x="70" y="85" font-size="13" font-weight="700" fill="#2563eb">OAuth2 (RFC 6749)</text>
  <text x="70" y="105" font-size="11" fill="#555">인가(Authorization): "이 리소스에 접근할 수 있는가?"</text>

  <rect x="70" y="120" width="180" height="44" rx="8" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="160" y="140" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">인가 코드 플로우</text>
  <text x="160" y="155" font-size="10" fill="#888" text-anchor="middle">10단계 시퀀스</text>

  <rect x="270" y="120" width="180" height="44" rx="8" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="360" y="140" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Access Token</text>
  <text x="360" y="155" font-size="10" fill="#888" text-anchor="middle">단기 키 (15분~1시간)</text>

  <rect x="470" y="120" width="180" height="44" rx="8" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="560" y="140" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Refresh Token</text>
  <text x="560" y="155" font-size="10" fill="#888" text-anchor="middle">갱신 키 (며칠~몇 주)</text>

  <!-- Arrow up -->
  <text x="410" y="205" font-size="20" fill="#16a34a" text-anchor="middle">▲</text>
  <text x="410" y="225" font-size="10" fill="#16a34a" text-anchor="middle" font-style="italic">scope=openid 추가 한 번으로 인증 계층 활성화</text>

  <!-- OIDC layer -->
  <rect x="40" y="240" width="740" height="120" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow-o)"/>
  <text x="70" y="265" font-size="13" font-weight="700" fill="#16a34a">OIDC (OpenID Connect Core 1.0)</text>
  <text x="70" y="285" font-size="11" fill="#555">인증(Authentication): "이 사용자가 누구인가?" + 위의 모든 것</text>

  <rect x="70" y="300" width="220" height="44" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="180" y="320" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">ID Token (JWT)</text>
  <text x="180" y="335" font-size="10" fill="#888" text-anchor="middle">서명된 신원 증명서</text>

  <rect x="310" y="300" width="200" height="44" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="320" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">UserInfo Endpoint</text>
  <text x="410" y="335" font-size="10" fill="#888" text-anchor="middle">사용자 정보 보충 API</text>

  <rect x="530" y="300" width="200" height="44" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="630" y="320" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Discovery</text>
  <text x="630" y="335" font-size="10" fill="#888" text-anchor="middle">/.well-known/...</text>

  <!-- Key insight -->
  <rect x="40" y="370" width="740" height="22" rx="6" fill="#fef3c7"/>
  <text x="410" y="385" font-size="10" fill="#92400e" text-anchor="middle">동일한 인가 코드 플로우를 따르되, scope에 openid를 추가하면 ID Token이 하나 더 내려온다</text>
</svg>
