<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 740 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
  </defs>
  <rect width="740" height="400" fill="#f8fafc" rx="8"/>
  <text x="370" y="26" text-anchor="middle" font-size="14" font-weight="700" font-family="sans-serif" fill="#37474f">🔄 탄력성(Elasticity) vs 확장성(Scalability)</text>
  <line x1="20" y1="36" x2="720" y2="36" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="20" y="45" width="700" height="175" rx="8" fill="#e8f5e9" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="370" y="68" text-anchor="middle" font-size="13" font-weight="700" font-family="sans-serif" fill="#15803d">⚡ 탄력성 (Elasticity)</text>
  <text x="370" y="88" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#546e7a">수요 변화에 따라 리소스를 자동으로 추가/제거</text>
  <rect x="55" y="102" width="80" height="45" rx="6" fill="#fff3e0" stroke="#f59e0b" stroke-width="1"/>
  <text x="95" y="122" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#e65100">서버</text>
  <text x="95" y="138" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#78909c">기본</text>
  <text x="175" y="128" text-anchor="middle" font-size="20" fill="#22c55e">→</text>
  <rect x="215" y="98" width="55" height="50" rx="6" fill="#fff3e0" stroke="#f59e0b" stroke-width="1"/>
  <text x="242" y="118" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#e65100">서버</text>
  <rect x="275" y="98" width="55" height="50" rx="6" fill="#fff3e0" stroke="#f59e0b" stroke-width="1"/>
  <text x="302" y="118" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#e65100">서버</text>
  <rect x="335" y="98" width="55" height="50" rx="6" fill="#fff3e0" stroke="#f59e0b" stroke-width="1"/>
  <text x="362" y="118" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#e65100">서버</text>
  <rect x="395" y="98" width="55" height="50" rx="6" fill="#fff3e0" stroke="#f59e0b" stroke-width="1"/>
  <text x="422" y="118" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#e65100">서버</text>
  <text x="342" y="145" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#ef4444">📈 Scale Out (피크)</text>
  <text x="492" y="128" text-anchor="middle" font-size="20" fill="#22c55e">→</text>
  <rect x="535" y="102" width="80" height="45" rx="6" fill="#fff3e0" stroke="#f59e0b" stroke-width="1"/>
  <text x="575" y="122" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#e65100">서버</text>
  <text x="575" y="138" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#78909c">다시 기본</text>
  <text x="645" y="122" text-anchor="middle" font-size="10" font-weight="600" font-family="sans-serif" fill="#0284c7">📉 Scale In</text>
  <line x1="20" y1="230" x2="720" y2="230" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="20" y="240" width="700" height="145" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="370" y="263" text-anchor="middle" font-size="13" font-weight="700" font-family="sans-serif" fill="#0d47a1">📐 확장성 (Scalability)</text>
  <text x="370" y="283" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#546e7a">시스템이 증가하는 부하를 처리하는 능력</text>
  <rect x="50" y="300" width="300" height="65" rx="8" fill="#fff3e0" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="200" y="322" text-anchor="middle" font-size="12" font-weight="700" font-family="sans-serif" fill="#e65100">⬆️ Scale Up (수직)</text>
  <text x="200" y="342" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#546e7a">서버 사양 업그레이드</text>
  <text x="200" y="358" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#78909c">CPU, RAM 추가</text>
  <rect x="390" y="300" width="300" height="65" rx="8" fill="#e8f5e9" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="540" y="322" text-anchor="middle" font-size="12" font-weight="700" font-family="sans-serif" fill="#15803d">↔️ Scale Out (수평)</text>
  <text x="540" y="342" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#546e7a">서버 대수 추가</text>
  <text x="540" y="358" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#78909c">인스턴스 수 증설</text>
</svg>