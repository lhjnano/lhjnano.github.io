<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-d1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="700" height="420" fill="#f8fafb" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">클라우드 서비스 모델</text>
  <rect x="80" y="50" width="540" height="80" rx="8" fill="#fff3e0" stroke="#ff9900" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="75" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#e65100">SaaS (Software as a Service)</text>
  <text x="350" y="95" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#546e7a">완성된 소프트웨어를 서비스로 제공</text>
  <text x="350" y="115" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#78909c">예: AWS WorkSpaces, Office 365, Salesforce</text>
  <rect x="80" y="145" width="540" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="170" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#0d47a1">PaaS (Platform as a Service)</text>
  <text x="350" y="190" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#546e7a">개발/배포 플랫폼 제공, 애플리케이션에만 집중</text>
  <text x="350" y="210" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#78909c">예: AWS Elastic Beanstalk, AWS Lambda, RDS</text>
  <rect x="80" y="240" width="540" height="80" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="265" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#1565c0">IaaS (Infrastructure as a Service)</text>
  <text x="350" y="285" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#546e7a">가상화된 컴퓨팅 인프라 제공</text>
  <text x="350" y="305" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#78909c">예: Amazon EC2, VPC, EBS</text>
  <text x="350" y="345" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#37474f">관리 책임</text>
  <text x="170" y="370" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#78909c">온프레미스: 고객이 모든 것을 관리</text>
  <text x="350" y="370" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#78909c">IaaS: 고객이 OS, 앱, 데이터 관리</text>
  <text x="530" y="370" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#78909c">PaaS: 앱, 데이터만 관리</text>
  <text x="350" y="400" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#546e7a">SaaS: 공급자가 거의 모든 것을 관리</text>
  <line x1="80" y1="340" x2="620" y2="340" stroke="#cfd8dc" stroke-width="1"/>
</svg>