  <rect x="530" y="155" width="180" height="75" rx="8" fill="#ffffff" stroke="#9c27b0" stroke-width="1.5" filter="url(#shadow9)"/>
  <text x="620" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">Lambda (자동 처리)</text>
  <line x1="620" y1="230" x2="620" y2="300" stroke="#546e7a" stroke-width="1" marker-end="url(#arrow9)"/>
  <rect x="530" y="300" width="180" height="60" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
