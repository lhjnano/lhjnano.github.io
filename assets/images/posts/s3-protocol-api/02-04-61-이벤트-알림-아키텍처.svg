<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow9" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
    <filter id="shadow9"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="760" height="620" fill="#f8fafb" rx="8"/>
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">S3 이벤트 알림 아키텍처</text>
  <rect x="230" y="50" width="300" height="55" rx="10" fill="#fff3e0" stroke="#ff9900" stroke-width="2" filter="url(#shadow9)"/>
  <text x="380" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Amazon S3 (이벤트 소스)</text>
  <text x="380" y="95" text-anchor="middle" font-size="10" fill="#666">객체 업로드/삭제/복원 등 이벤트 발생</text>
  <text x="380" y="130" text-anchor="middle" font-size="11" fill="#546e7a">▼ 이벤트 전달 ▼</text>
