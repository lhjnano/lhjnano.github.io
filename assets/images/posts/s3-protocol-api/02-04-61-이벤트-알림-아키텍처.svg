  <text x="140" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">SNS (알림)</text>
  <line x1="50" y1="230" x2="50" y2="280" stroke="#546e7a" stroke-width="1"/>
  <line x1="230" y1="230" x2="230" y2="280" stroke="#546e7a" stroke-width="1"/>
