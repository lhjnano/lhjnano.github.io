  <rect x="50" y="300" width="180" height="60" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="140" y="325" text-anchor="middle" font-size="10" fill="#1565c0">이메일 / SMS / HTTP</text>
  <rect x="290" y="155" width="180" height="75" rx="8" fill="#ffffff" stroke="#43a047" stroke-width="1.5" filter="url(#shadow9)"/>
  <text x="380" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">SQS (큐잉)</text>
  <line x1="380" y1="230" x2="380" y2="300" stroke="#546e7a" stroke-width="1" marker-end="url(#arrow9)"/>
  <rect x="290" y="300" width="180" height="60" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
