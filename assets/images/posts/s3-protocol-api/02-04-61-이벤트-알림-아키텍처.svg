  <text x="380" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Amazon EventBridge (고급 이벤트 라우팅)</text>
  <text x="380" y="455" text-anchor="middle" font-size="10" fill="#555">S3 이벤트 → EventBridge 버스 → 규칙 평가 → 타겟 (다중 타겟 가능)</text>
  <text x="380" y="485" text-anchor="middle" font-size="11" font-weight="bold" fill="#795548">필터링:</text>
