<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
    <filter id="shadow5"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="760" height="700" fill="#f8fafb" rx="8"/>
  <text x="380" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">OpenSharing 아키텍처 개요</text>
  <rect x="40" y="50" width="250" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow5)"/>
  <text x="165" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">데이터 제공자 (Provider)</text>
  <text x="165" y="90" text-anchor="middle" font-size="10" fill="#495057">업로드 / 관리</text>
  <rect x="470" y="50" width="250" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow5)"/>
  <text x="595" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">데이터 소비자 (Consumer)</text>
  <text x="595" y="90" text-anchor="middle" font-size="10" fill="#495057">분석 / 활용</text>
  <line x1="165" y1="100" x2="310" y2="130" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="595" y1="100" x2="450" y2="130" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrow5)"/>
