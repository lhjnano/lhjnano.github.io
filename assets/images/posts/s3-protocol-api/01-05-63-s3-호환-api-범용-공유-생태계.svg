  <text x="380" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Amazon S3</text>
  <rect x="140" y="175" width="220" height="55" rx="6" fill="#ffffff" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="250" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">S3 Access Points</text>
  <text x="250" y="216" text-anchor="middle" font-size="10" fill="#666666">전용 엔드포인트 / 개별 권한 정책</text>
  <rect x="400" y="175" width="220" height="55" rx="6" fill="#ffffff" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="510" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">AWS Data Exchange</text>
  <text x="510" y="216" text-anchor="middle" font-size="10" fill="#666666">구독 관리 / 상업적 거래</text>
  <rect x="140" y="245" width="220" height="55" rx="6" fill="#ffffff" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="250" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">S3 Access Grants</text>
  <text x="250" y="286" text-anchor="middle" font-size="10" fill="#666666">세분화된 권한 위임 / 디렉토리 수준</text>
  <rect x="400" y="245" width="220" height="55" rx="6" fill="#ffffff" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="510" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Registry of Open Data (RODA)</text>
  <text x="510" y="286" text-anchor="middle" font-size="10" fill="#666666">공개 데이터셋 / 무료 접근</text>
  <rect x="270" y="315" width="220" height="55" rx="6" fill="#ffffff" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="380" y="338" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Multi-Region Access Points</text>
  <text x="380" y="356" text-anchor="middle" font-size="10" fill="#666666">글로벌 접근 / 자동 페일오버</text>
  <rect x="180" y="400" width="400" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">S3 호환 스토리지</text>
  <text x="380" y="436" text-anchor="middle" font-size="10" fill="#495057">MinIO, Ceph, GCS (동일한 API로 접근)</text>
