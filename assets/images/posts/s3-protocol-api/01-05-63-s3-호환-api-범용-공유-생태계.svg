  <text x="380" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">분석 서비스</text>
  <text x="380" y="505" text-anchor="middle" font-size="10" fill="#495057">Athena / Redshift / EMR / SageMaker / QuickSight</text>
