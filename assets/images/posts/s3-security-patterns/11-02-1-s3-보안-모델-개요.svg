<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg">
<defs><filter id="sh" x="-2%" y="-2%" width="104%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter><marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#546e7a"/></marker></defs>
<rect x="0" y="0" width="720" height="540" rx="12" fill="#fafbfc" stroke="#e2e8f0"/>
<text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">🔐 보안 결정 흐름 (요청 → 허용/거부)</text>
<rect x="280" y="42" width="160" height="48" rx="8" fill="#e8f5e9" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
<text x="360" y="63" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">📨 요청 발생</text>
<text x="360" y="79" text-anchor="middle" font-size="10" fill="#475569">S3 API 호출</text>
<line x1="360" y1="90" x2="360" y2="116" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="80" y="118" width="560" height="68" rx="8" fill="#fce4ec" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
<text x="360" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">❌ 1. 명시적 Deny 확인</text>
<text x="360" y="158" text-anchor="middle" font-size="11" fill="#475569">IAM 정책, 버킷 정책, VPC 엔드포인트 정책</text>
<text x="360" y="175" text-anchor="middle" font-size="11" fill="#dc2626">→ Deny가 있으면 즉시 거부 🚫</text>
<text x="560" y="196" font-size="10" fill="#22c55e" font-weight="bold">Deny 없음 ✅</text>
<line x1="360" y1="186" x2="360" y2="212" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="80" y="214" width="560" height="68" rx="8" fill="#fce4ec" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
<text x="360" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">🚫 2. Block Public Access 확인</text>
<text x="360" y="254" text-anchor="middle" font-size="11" fill="#475569">계정 수준 + 버킷 수준</text>
<text x="360" y="271" text-anchor="middle" font-size="11" fill="#dc2626">→ 공개 접근이면 거부</text>
<text x="560" y="292" font-size="10" fill="#22c55e" font-weight="bold">통과 ✅</text>
<line x1="360" y1="282" x2="360" y2="308" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="80" y="310" width="460" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
<text x="310" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">✅ 3. 명시적 Allow 확인</text>
<text x="310" y="350" text-anchor="middle" font-size="11" fill="#475569">IAM + 버킷 정책 + ACL의 교집합</text>
<text x="310" y="367" text-anchor="middle" font-size="11" fill="#2563eb">→ Allow가 있으면 허용 ✅</text>
<rect x="570" y="318" width="130" height="52" rx="8" fill="#e8f5e9" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
<text x="635" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">✅ 허용</text>
<text x="635" y="358" text-anchor="middle" font-size="10" fill="#475569">접근 승인</text>
<line x1="540" y1="344" x2="568" y2="344" stroke="#22c55e" stroke-width="2" marker-end="url(#ar)"/>
<text x="560" y="392" font-size="10" fill="#ef4444" font-weight="bold">Allow 없음 ❌</text>
<line x1="360" y1="378" x2="360" y2="404" stroke="#546e7a" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="240" y="406" width="240" height="52" rx="8" fill="#fce4ec" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
<text x="360" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">🚫 거부 (Denied)</text>
<text x="360" y="448" text-anchor="middle" font-size="10" fill="#475569">기본적으로 모든 접근은 거부</text>
<text x="360" y="498" text-anchor="middle" font-size="11" fill="#94a3b8">원칙: 명시적 Deny > Block Public Access > 명시적 Allow > 기본 거부</text>
<text x="360" y="518" text-anchor="middle" font-size="10" fill="#94a3b8">기본적으로 모든 S3 접근은 암시적으로 거부됩니다</text>
</svg>