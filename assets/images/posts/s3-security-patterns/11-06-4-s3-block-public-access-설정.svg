<text x="510" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">☑ RestrictPublicBuckets</text>
<text x="510" y="190" text-anchor="middle" font-size="10" fill="#495057">공개 정책이 있는 버킷 제한</text>
