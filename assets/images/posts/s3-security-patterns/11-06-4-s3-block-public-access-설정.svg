<text x="210" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">☑ BlockPublicPolicy</text>
<text x="210" y="190" text-anchor="middle" font-size="10" fill="#495057">공개 버킷 정책 차단</text>
