<text x="360" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">⚠️ 원칙: 계정 수준에서 모두 활성화 → 버킷별 필요시만 해제</text>
<text x="360" y="384" text-anchor="middle" font-size="10" fill="#495057">공개 데이터셋을 제공해야 하는 경우에만 선택적 해제 권장</text>
