<text x="360" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">☑️ 계정 수준 Block Public Access (최우선)</text>
<rect x="50" y="82" width="620" height="130" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1" filter="url(#sh_cess설정)"/>
<rect x="70" y="94" width="280" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
<text x="210" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">☑ BlockPublicAcls</text>
<text x="210" y="132" text-anchor="middle" font-size="10" fill="#495057">ACL을 통한 공개 접근 차단</text>
<rect x="370" y="94" width="280" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
