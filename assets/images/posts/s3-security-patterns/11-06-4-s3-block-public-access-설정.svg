<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
<defs><filter id="sh_cess설정" x="-2%" y="-2%" width="104%" height="108%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter><marker id="ar_cess설정" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#546e7a"/></marker></defs>
<rect x="0" y="0" width="720" height="420" rx="12" fill="#fafbfc" stroke="#e2e8f0"/>
<text x="360" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">🚫 S3 Block Public Access 설정 계층</text>
