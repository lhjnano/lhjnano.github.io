<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 480" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect x="65" y="15" width="130" height="50" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="130" y="45" font-size="13" fill="#4183c4" font-weight="bold" text-anchor="middle">클라이언트</text>
  <line x1="130" y1="65" x2="130" y2="455" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="385" y="15" width="130" height="50" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="450" y="45" font-size="13" fill="#4183c4" font-weight="bold" text-anchor="middle">서버</text>
  <line x1="450" y1="65" x2="450" y2="455" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="142" y1="110" x2="438" y2="110" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="290.0" y="90" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">POST /auth/login</text>
  <text x="290.0" y="104" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">{username, password}</text>
  <line x1="438" y1="170" x2="142" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="290.0" y="150" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">LDAP 인증 + JWT 생성</text>
  <text x="290.0" y="164" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">(secret_key로 서명)</text>
  <line x1="438" y1="230" x2="142" y2="230" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="290.0" y="224" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">JWT 반환</text>
  <line x1="142" y1="295" x2="438" y2="295" stroke="#4183c4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="290.0" y="275" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">API 호출</text>
  <text x="290.0" y="289" font-size="10" fill="#4183c4" font-weight="normal" text-anchor="middle">Authorization: Bearer &lt;JWT&gt;</text>
  <line x1="438" y1="365" x2="142" y2="365" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="290.0" y="331" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">JWT 검증 (서명, 만료)</text>
  <text x="290.0" y="345" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">+ 권한 확인 (PBAC)</text>
  <text x="290.0" y="359" font-size="10" fill="#3fb950" font-weight="normal" text-anchor="middle">-&gt; 200 OK</text>
  <line x1="438" y1="430" x2="142" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="290.0" y="424" font-size="10" fill="#555" font-weight="normal" text-anchor="middle">데이터 반환</text>

</svg>