<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect x="45.0" y="50" width="210" height="160" rx="10" fill="#f0f4f8" stroke="#4183c4" stroke-width="1.5"/>
  <text x="150.0" y="80" font-size="15" fill="#4183c4" font-weight="bold" text-anchor="middle">인증 (AuthN)</text>
  <text x="150.0" y="105" font-size="12" fill="#8b949e" font-weight="normal" text-anchor="middle">"너 누구야?"</text>
  <text x="150.0" y="140" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">비밀번호</text>
  <text x="150.0" y="162" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">MFA / SSO</text>
  <text x="150.0" y="184" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">인증서 (x509)</text>
  <rect x="295.0" y="50" width="210" height="160" rx="10" fill="#f8f0ff" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="400.0" y="80" font-size="15" fill="#bc8cff" font-weight="bold" text-anchor="middle">인가 (AuthZ)</text>
  <text x="400.0" y="105" font-size="12" fill="#8b949e" font-weight="normal" text-anchor="middle">"뭘 할 수 있어?"</text>
  <text x="400.0" y="140" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">RBAC (역할)</text>
  <text x="400.0" y="162" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">PBAC (정책)</text>
  <text x="400.0" y="184" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">ABAC (속성)</text>
  <rect x="545.0" y="50" width="210" height="160" rx="10" fill="#fffdf0" stroke="#d29922" stroke-width="1.5"/>
  <text x="650.0" y="80" font-size="15" fill="#d29922" font-weight="bold" text-anchor="middle">감사 (Audit)</text>
  <text x="650.0" y="105" font-size="12" fill="#8b949e" font-weight="normal" text-anchor="middle">"뭘 했어?"</text>
  <text x="650.0" y="140" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">접근 로그</text>
  <text x="650.0" y="162" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">변경 이력</text>
  <text x="650.0" y="184" font-size="12" fill="#555" font-weight="normal" text-anchor="middle">컴플라이언스</text>
  <line x1="150.0" y1="210" x2="150.0" y2="245" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="400.0" y1="210" x2="400.0" y2="245" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="650.0" y1="210" x2="650.0" y2="245" stroke="#666" stroke-width="1.8" marker-end="url(#ah)"/>
  <rect x="230.0" y="245" width="340" height="50" rx="10" fill="#e8eef3" stroke="#8b949e" stroke-width="1.5"/>
  <text x="400.0" y="276" font-size="13" fill="#333" font-weight="bold" text-anchor="middle">Identity Store (AD / LDAP / DB)</text>

