  <text x="815" y="134" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2e7d32">S3 Tables (NEW)</text>
  <line x1="755" y1="142" x2="875" y2="142" stroke="#a5d6a7" stroke-width="0.5"/>
  <text x="815" y="160" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#2e7d32">S3 Vectors (NEW)</text>
