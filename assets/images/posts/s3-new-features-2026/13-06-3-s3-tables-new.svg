<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-tb1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
    <filter id="sh-tb1" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="700" height="430" rx="8" fill="#f8fafb"/>
  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">S3 Tables: Apache Iceberg 관리형 테이블</text>
  <!-- Outer container -->
  <rect x="20" y="38" width="660" height="385" rx="8" fill="white" stroke="#b0bec5" stroke-width="1.5" filter="url(#sh-tb1)"/>
  <text x="350" y="60" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#37474f">S3 Tables 아키텍처</text>
  <!-- Table Bucket -->
  <rect x="60" y="75" width="580" height="200" rx="6" fill="#fff3e0" stroke="#ff9900" stroke-width="1.5" filter="url(#sh-tb1)"/>
  <text x="350" y="97" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#e65100">Table Bucket (테이블 전용 버킷)</text>
  <!-- Table: sales_data -->
  <rect x="80" y="110" width="160" height="90" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#sh-tb1)"/>
  <text x="160" y="130" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1b5e20">Table: sales_data</text>
  <text x="160" y="148" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">Iceberg 포맷</text>
  <text x="160" y="163" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">Parquet 파일</text>
  <text x="160" y="178" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">스냅샷 관리</text>
  <!-- Table: user_events -->
  <rect x="260" y="110" width="160" height="90" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#sh-tb1)"/>
  <text x="340" y="130" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1b5e20">Table: user_events</text>
  <text x="340" y="148" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">Iceberg 포맷</text>
  <text x="340" y="163" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">ORC 파일</text>
  <text x="340" y="178" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">파티셔닝</text>
  <!-- Table: inventory -->
  <rect x="440" y="110" width="160" height="90" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#sh-tb1)"/>
  <text x="520" y="130" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1b5e20">Table: inventory</text>
  <text x="520" y="148" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">Iceberg 포맷</text>
  <text x="520" y="163" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">Parquet 파일</text>
  <text x="520" y="178" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#2e7d32">압축 최적화</text>
  <!-- Auto management -->
  <text x="100" y="225" font-size="10" font-family="sans-serif" fill="#e65100">자동 관리:</text>
  <text x="100" y="240" font-size="9" font-family="sans-serif" fill="#bf360c">• 파일 압축 (Compaction)  • 스냅샷 만료 관리  • 분리된 파일 정리  • 메타데이터 최적화</text>
  <!-- Arrows down -->
  <line x1="160" y1="275" x2="160" y2="295" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-tb1)"/>
  <line x1="350" y1="275" x2="350" y2="295" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-tb1)"/>
  <line x1="540" y1="275" x2="540" y2="295" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-tb1)"/>
  <!-- Query engines -->
  <rect x="60" y="305" width="160" height="50" rx="5" fill="#e8f0fe" stroke="#4285f4" stroke-width="1" filter="url(#sh-tb1)"/>
  <text x="140" y="326" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1565c0">Amazon Athena</text>
  <text x="140" y="342" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#1565c0">SQL 쿼리</text>
  <rect x="260" y="305" width="160" height="50" rx="5" fill="#e8f0fe" stroke="#4285f4" stroke-width="1" filter="url(#sh-tb1)"/>
  <text x="340" y="326" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1565c0">Apache Spark</text>
  <text x="340" y="342" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#1565c0">대규모 처리</text>
  <rect x="460" y="305" width="160" height="50" rx="5" fill="#e8f0fe" stroke="#4285f4" stroke-width="1" filter="url(#sh-tb1)"/>
  <text x="540" y="326" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#1565c0">Trino</text>
  <text x="540" y="342" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#1565c0">분산 쿼리</text>
</svg>