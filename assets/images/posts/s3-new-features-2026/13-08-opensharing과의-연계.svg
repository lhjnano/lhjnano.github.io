<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-ts1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
    <filter id="sh-ts1" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="700" height="340" rx="8" fill="#f8fafb"/>
  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">S3 Tables × OpenSharing: 테이블 형태의 데이터 공유</text>
  <!-- Data Provider -->
  <rect x="40" y="50" width="240" height="200" rx="6" fill="#fff3e0" stroke="#ff9900" stroke-width="1.5" filter="url(#sh-ts1)"/>
  <text x="160" y="72" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#e65100">데이터 제공자</text>
  <text x="160" y="92" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#bf360c">Table Bucket</text>
  <rect x="60" y="105" width="200" height="45" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="160" y="125" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1b5e20">sales.orders</text>
  <text x="160" y="140" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1b5e20">Iceberg 포맷</text>
  <rect x="60" y="158" width="200" height="45" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="160" y="178" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1b5e20">marketing.campaigns</text>
  <text x="160" y="193" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1b5e20">Iceberg 포맷</text>
  <!-- Arrows -->
  <line x1="280" y1="120" x2="430" y2="120" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrow-ts1)"/>
  <text x="355" y="112" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">S3 Grants</text>
  <line x1="280" y1="180" x2="430" y2="180" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrow-ts1)"/>
  <text x="355" y="172" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#546e7a">(테이블 권한)</text>
  <!-- Data Consumer -->
  <rect x="440" y="50" width="230" height="200" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5" filter="url(#sh-ts1)"/>
  <text x="555" y="72" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#1565c0">데이터 소비자</text>
  <text x="555" y="100" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#1565c0">Athena 쿼리</text>
  <text x="555" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#1565c0">Spark 작업</text>
  <text x="555" y="140" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#1565c0">Trino 쿼리</text>
  <text x="555" y="170" text-anchor="middle" font-size="10" font-family="monospace" fill="#1565c0">SELECT *</text>
  <text x="555" y="186" text-anchor="middle" font-size="10" font-family="monospace" fill="#1565c0">FROM shared.orders</text>
  <!-- Benefits -->
  <rect x="40" y="265" width="630" height="65" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#sh-ts1)"/>
  <text x="60" y="285" font-size="10" font-family="sans-serif" fill="#2e7d32">• 구조화된 데이터를 테이블 형태로 공유  • 스키마 진화 자동 반영</text>
  <text x="60" y="302" font-size="10" font-family="sans-serif" fill="#2e7d32">• 스냅샷 격리로 일관된 읽기 보장  • Time Travel: 특정 시점 데이터 복원</text>
  <text x="60" y="319" font-size="10" font-family="sans-serif" fill="#2e7d32">• ACID 트랜잭션 지원으로 데이터 무결성 보장</text>
</svg>