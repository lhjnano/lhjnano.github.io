<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-f1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker>
    <filter id="sh-f1" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="700" height="360" rx="8" fill="#f8fafb"/>
  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#37474f">S3 Files: 파일 시스템 인터페이스</text>
  <!-- Outer container -->
  <rect x="20" y="38" width="660" height="310" rx="8" fill="white" stroke="#b0bec5" stroke-width="1.5" filter="url(#sh-f1)"/>
  <text x="350" y="62" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#37474f">기존 방식 vs S3 Files</text>
  <!-- Legacy box -->
  <rect x="45" y="75" width="610" height="120" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1" filter="url(#sh-f1)"/>
  <text x="350" y="95" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#c62828">기존 (객체 API)</text>
  <!-- Flow: 애플리케이션 → SDK/CLI → S3 API → S3 객체 -->
  <rect x="60" y="108" width="110" height="36" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="115" y="130" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1565c0">애플리케이션</text>
  <line x1="170" y1="126" x2="195" y2="126" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-f1)"/>
  <rect x="205" y="108" width="90" height="36" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="250" y="130" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1565c0">SDK/CLI</text>
  <line x1="295" y1="126" x2="320" y2="126" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-f1)"/>
  <rect x="330" y="108" width="110" height="36" rx="4" fill="#fff3e0" stroke="#ff9900" stroke-width="1"/>
  <text x="385" y="130" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#e65100">S3 API (REST)</text>
  <line x1="440" y1="126" x2="465" y2="126" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-f1)"/>
  <rect x="475" y="108" width="100" height="36" rx="4" fill="#fff3e0" stroke="#ff9900" stroke-width="1"/>
  <text x="525" y="130" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#e65100">S3 객체</text>
  <text x="60" y="168" font-size="10" font-family="sans-serif" fill="#c62828">• S3 SDK 메서드 호출 필요 (GetObject, PutObject)</text>
  <text x="60" y="183" font-size="10" font-family="sans-serif" fill="#c62828">• 코드 수정 필요 • 파일 시스템 의미 체계 미지원 (잠금, append 등)</text>
  <!-- S3 Files box -->
  <rect x="45" y="205" width="610" height="130" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5" filter="url(#sh-f1)"/>
  <text x="350" y="225" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#1b5e20">S3 Files (NEW)</text>
  <rect x="60" y="238" width="110" height="36" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="115" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1565c0">애플리케이션</text>
  <line x1="170" y1="256" x2="195" y2="256" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-f1)"/>
  <rect x="205" y="238" width="120" height="36" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
  <text x="265" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#1565c0">파일 시스템 API</text>
  <line x1="325" y1="256" x2="350" y2="256" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-f1)"/>
  <rect x="360" y="238" width="100" height="36" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="410" y="260" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif" fill="#1b5e20">S3 Files</text>
  <line x1="460" y1="256" x2="485" y2="256" stroke="#546e7a" stroke-width="1.2" marker-end="url(#arrow-f1)"/>
  <rect x="495" y="238" width="100" height="36" rx="4" fill="#fff3e0" stroke="#ff9900" stroke-width="1"/>
  <text x="545" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#e65100">S3 객체</text>
  <text x="60" y="295" font-size="10" font-family="sans-serif" fill="#2e7d32">• 기존 애플리케이션 코드 수정 없이 사용 가능</text>
  <text x="60" y="310" font-size="10" font-family="sans-serif" fill="#2e7d32">• NFS/SMB 의미 체계 지원 • 파일 잠금, append, 부분 갱신 지원</text>
  <text x="60" y="325" font-size="10" font-family="sans-serif" fill="#2e7d32">• 데이터 복제/동기화 불필요</text>
</svg>